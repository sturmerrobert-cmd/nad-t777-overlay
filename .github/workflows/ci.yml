name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@11.1.2).
      # Do NOT also set `version:` here — action-setup errors on having both.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck (api)
        run: pnpm --filter @receiver-hq/api typecheck

      - name: Test (api)
        run: pnpm --filter @receiver-hq/api test

      - name: Typecheck + build (web)
        run: pnpm --filter @receiver-hq/web build
